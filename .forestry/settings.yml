---
sections:
- type: directory
  path: src/content/blog
  label: Blog Posts
  create: all
  match: "**/*"
  templates:
  - blog-post
- type: directory
  path: src/content/projects
  label: Projetos
  create: all
  match: "**/*"
  templates:
  - project
upload_dir: public/images
public_path: "/images"
front_matter_path: ""
use_front_matter_path: false
file_template: ":filename:"
build:
  preview_env:
  - HUGO_TZ=UTC
  preview_output_directory: dist
  preview_docker_image: 'davidwparker/hugo-docker:latest'
  install_dependencies_command: npm ci
  preview_command: npm run build
  mount_path: "/srv"
  working_dir: "/srv"
  instant_preview_command: npm run dev
version: 0.83.0
