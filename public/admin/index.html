<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/decap-cms@3.1.2/dist/decap-cms.css" />
  </head>
  <body>
    <!-- Carregar config primeiro -->
    <script src="./config.js"></script>
    <!-- Depois carregar o Decap CMS -->
    <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.1.2/dist/decap-cms.js"></script>
    <script>
      // Aguardar o CMS carregar e usar a config global
      window.addEventListener('load', function() {
        console.log('Página carregada');
        if (window.CMS && typeof CMS.loadConfig === 'function') {
          console.log('Decap CMS carregado, aplicando config...');
          if (window.CMS_CONFIG) {
            CMS.loadConfig({config: window.CMS_CONFIG});
            console.log('Config aplicada');
          }
        }
      });
    </script>
  </body>
</html>
